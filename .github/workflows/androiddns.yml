name: 自动发布 dnscache 二进制
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: 交叉编译
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-musl
            name: dnscache-android-aarch64
            linker: aarch64-linux-musl-gcc
          - target: x86_64-unknown-linux-musl
            name: dnscache-linux-x86_64
            linker: x86_64-linux-musl-gcc
          - target: armv7-unknown-linux-musleabihf
            name: dnscache-android-armv7
            linker: arm-linux-musleabihf-gcc

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt update
          sudo apt install -y musl-tools musl-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf zip
          wget https://musl.cc/aarch64-linux-musl-cross.tgz
          wget https://musl.cc/x86_64-linux-musl-cross.tgz
          wget https://musl.cc/arm-linux-musleabihf-cross.tgz
          sudo tar xf aarch64-linux-musl-cross.tgz -C /opt
          sudo tar xf x86_64-linux-musl-cross.tgz -C /opt
          sudo tar xf arm-linux-musleabihf-cross.tgz -C /opt
          echo "/opt/aarch64-linux-musl-cross/bin" >> $GITHUB_PATH
          echo "/opt/x86_64-linux-musl-cross/bin" >> $GITHUB_PATH
          echo "/opt/arm-linux-musleabihf-cross/bin" >> $GITHUB_PATH

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 配置交叉编译
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << EOF
          [target.${{ matrix.target }}]
          linker = "${{ matrix.linker }}"
          rustflags = ["-C", "target-feature=+crt-static", "-C", "strip=symbols"]
          EOF

      - name: 编译 Release 版本
        run: cargo build --release --target ${{ matrix.target }}

      - name: 重命名+打包
        run: |
          mv target/${{ matrix.target }}/release/dnscache ${{ matrix.name }}
          chmod 755 ${{ matrix.name }}
          zip ${{ matrix.name }}.zip ${{ matrix.name }}

      - name: 上传产物到发布页
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
